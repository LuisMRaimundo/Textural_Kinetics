name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  test:
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest]
        python-version: ["3.10", "3.11"]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
      - run: pip install -e ".[dev,full]"
      - run: >
          mypy --follow-imports=skip granular_v2/offsets.py granular_v2/audit.py
          granular_v2/timebase.py granular_v2/note_extraction.py granular_v2/onset_extraction.py
          granular_v2/loader.py granular_v2/util_tempo.py
      - run: pytest tests -q
      - run: python corpus/scripts/compare_all.py
